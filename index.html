<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoanSmart AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0F;
            --card-dark: #0F1117;
            --gold: #F5C518;
            --gold-grad: linear-gradient(135deg, #F5C518, #F9E076);
            --blue: #4F8EF7;
            --blue-grad: linear-gradient(135deg, #4F8EF7, #326CE5);
            --red: #FF4444;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A5B1;
            --border-gold: rgba(245, 197, 24, 0.1);
        }

        [data-theme="light"] {
            --bg-dark: #F4F6F8;
            --card-dark: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --border-gold: rgba(245, 197, 24, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-primary); 
            overflow-x: hidden; 
            min-height: 100vh; 
            transition: background 0.3s ease, color 0.3s ease; 
        }

        .screen { 
            display: none; 
            opacity: 0; 
            transition: opacity 0.4s ease; 
            min-height: 100vh; 
            width: 100%; 
        }
        
        .screen.active { 
            display: flex; 
            opacity: 1; 
            flex-direction: column; 
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
            width: 100%; 
        }

        .glass-card { 
            background: var(--card-dark); 
            border: 1px solid var(--border-gold); 
            border-radius: 20px; 
            padding: 24px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); 
            transition: all 0.3s ease;
        }

        .gold-text { 
            background: var(--gold-grad); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 700; 
        }

        .btn { 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            color: white; 
        }

        .btn-blue { 
            background: var(--blue-grad); 
            box-shadow: 0 4px 15px rgba(79, 142, 247, 0.3); 
        }
        
        .btn-blue:active { transform: scale(0.98); }

        /* Screen 1: Login */
        #screen-1 { justify-content: center; align-items: center; }
        .logo-container { text-align: center; margin-bottom: 40px; }
        .logo-icon { 
            width: 80px; 
            height: 80px; 
            background: var(--gold-grad); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto 20px; 
            box-shadow: 0 0 30px rgba(245, 197, 24, 0.2); 
        }
        .logo-icon svg { width: 40px; height: 40px; fill: #0A0A0F; }
        .login-form { width: 100%; }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; }
        .phone-input-wrap { 
            display: flex; 
            align-items: center; 
            background: var(--card-dark); 
            border: 1px solid var(--border-gold); 
            border-radius: 12px; 
            overflow: hidden; 
            transition: all 0.3s ease; 
        }
        .phone-input-wrap:focus-within { border-color: var(--gold); box-shadow: 0 0 10px rgba(245, 197, 24, 0.1); }
        .phone-prefix { padding: 16px; color: var(--gold); font-weight: 600; background: rgba(245, 197, 24, 0.05); border-right: 1px solid var(--border-gold); }
        .phone-input { flex: 1; background: transparent; border: none; padding: 16px; color: var(--text-primary); font-size: 1.1rem; outline: none; }

        /* Screen 2: OTP */
        #screen-2 { justify-content: center; align-items: center; }
        .otp-header { text-align: center; margin-bottom: 30px; }
        .otp-subtitle { color: var(--text-secondary); margin-top: 10px; }
        .otp-boxes { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 30px; }
        .otp-box { 
            width: 45px; 
            height: 55px; 
            background: var(--card-dark); 
            border: 1px solid var(--border-gold); 
            border-radius: 10px; 
            font-size: 1.5rem; 
            text-align: center; 
            color: var(--gold); 
            outline: none; 
            transition: all 0.3s ease; 
        }
        .otp-box:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(245, 197, 24, 0.2); transform: translateY(-2px); }
        .timer { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: 20px; }
        .timer span { color: var(--gold); font-weight: 600; }
        
        #otp-success { 
            display: none; 
            text-align: center; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
        }
        .check-circle { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            background: var(--gold-grad); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #0A0A0F; 
            font-size: 35px; 
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }
        @keyframes scaleIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Screen 3: Main App */
        .app-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            margin-bottom: 20px; 
            border-bottom: 1px solid var(--border-gold); 
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { 
            width: 36px; 
            height: 36px; 
            background: var(--gold-grad); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .header-logo svg { width: 18px; height: 18px; fill: #0A0A0F; }
        .user-phone { color: var(--text-secondary); font-size: 0.9rem; background: rgba(128,128,128,0.1); padding: 5px 12px; border-radius: 20px; font-weight: 500; }
        
        .lang-switcher { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
            scrollbar-width: none; 
        }
        .lang-switcher::-webkit-scrollbar { display: none; }
        .lang-pill { 
            background: var(--card-dark); 
            border: 1px solid var(--border-gold); 
            color: var(--text-secondary); 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: 500; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: all 0.3s ease; 
        }
        .lang-pill.active { 
            background: var(--gold-grad); 
            color: #0A0A0F; 
            border-color: transparent; 
            font-weight: 600; 
            box-shadow: 0 4px 10px rgba(245, 197, 24, 0.3); 
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }
        .form-select, .form-input { 
            width: 100%; 
            background: rgba(128,128,128,0.05); 
            border: 1px solid var(--border-gold); 
            padding: 14px; 
            border-radius: 10px; 
            color: var(--text-primary); 
            outline: none; 
            transition: all 0.3s; 
            font-size: 0.95rem; 
        }
        .form-select:focus, .form-input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(79, 142, 247, 0.1); }
        .form-select option { background: var(--card-dark); color: var(--text-primary); }

        .result-card { margin-top: 25px; display: none; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-status { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 25px; }
        .status-approved { color: var(--gold); text-shadow: 0 0 20px rgba(245, 197, 24, 0.4); }
        .status-rejected { color: var(--red); text-shadow: 0 0 20px rgba(255, 68, 68, 0.4); }

        .score-container { margin-bottom: 25px; }
        .score-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; font-weight: 500; }
        .score-track { height: 10px; background: rgba(128,128,128,0.2); border-radius: 5px; overflow: hidden; position: relative; }
        .score-fill { 
            height: 100%; 
            width: 0%; 
            background: var(--blue-grad); 
            border-radius: 5px; 
            box-shadow: 0 0 15px var(--blue); 
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .score-threshold { 
            position: absolute; left: 55%; top: 0; bottom: 0; width: 2px; 
            background: var(--text-primary); z-index: 2; opacity: 0.5;
        }

        .factors-title { font-size: 1rem; color: var(--text-secondary); margin-bottom: 15px; font-weight: 500; }
        .factors-list { list-style: none; margin-bottom: 25px; }
        .factors-list li { 
            display: flex; 
            align-items: flex-start; 
            gap: 12px; 
            margin-bottom: 12px; 
            font-size: 0.95rem; 
            color: var(--text-primary); 
            background: rgba(128,128,128,0.05);
            padding: 12px;
            border-radius: 8px;
        }
        .factors-list li .icon { color: var(--gold); font-size: 1.1rem; }

        .simulator-section { border-top: 1px solid var(--border-gold); padding-top: 25px; }
        .sim-header { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: var(--gold); }
        .slider-group { margin-bottom: 20px; }
        .slider-info { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 12px; color: var(--text-secondary); }
        .slider-val { color: var(--blue); font-weight: 600; font-size: 1rem; }
        
        input[type="range"] { 
            width: 100%; 
            -webkit-appearance: none; 
            background: rgba(128,128,128,0.2); 
            height: 6px; 
            border-radius: 3px; 
            outline: none; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            background: var(--blue); 
            cursor: pointer; 
            box-shadow: 0 0 10px rgba(79, 142, 247, 0.5); 
            border: 2px solid var(--card-dark);
        }

        .theme-toggle { 
            background: rgba(128,128,128,0.1); 
            border: 1px solid var(--border-gold); 
            border-radius: 50%; 
            width: 36px; 
            height: 36px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            color: var(--text-primary); 
            transition: all 0.3s;
        }
        .theme-toggle:hover { background: rgba(128,128,128,0.2); }

        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="screen-1" class="screen active">
        <div class="container">
            <div class="glass-card" style="padding: 40px 24px;">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <h1 class="gold-text" style="font-size: 2rem;" data-i18n="app_name">LoanSmart AI</h1>
                    <p style="color: var(--text-secondary); margin-top: 8px;" data-i18n="login_sub">Premium Loan Intelligence</p>
                </div>
                
                <form id="login-form" class="login-form">
                    <div class="input-group">
                        <label data-i18n="phone_label">Mobile Number</label>
                        <div class="phone-input-wrap">
                            <span class="phone-prefix">+91</span>
                            <input type="tel" id="phone-input" class="phone-input" placeholder="Enter 10-digit number" maxlength="10" required pattern="[0-9]{10}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-blue" data-i18n="send_otp">Send OTP</button>
                </form>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: OTP -->
    <div id="screen-2" class="screen">
        <div class="container">
            <div class="glass-card" style="padding: 40px 24px;">
                <div id="otp-input-section">
                    <div class="otp-header">
                        <h2 data-i18n="verify_otp">Verify OTP</h2>
                        <p class="otp-subtitle"><span data-i18n="otp_sent">OTP sent to +91 ******</span><span id="display-phone-last4"></span></p>
                    </div>
                    
                    <div class="otp-boxes" id="otp-container">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" autofocus>
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    </div>
                    
                    <button id="verify-btn" class="btn btn-blue" data-i18n="verify_btn">Verify & Continue</button>
                    
                    <div class="timer">
                        <span data-i18n="resend_in">Resend OTP in </span> <span id="countdown">60</span>s
                    </div>
                </div>

                <div id="otp-success">
                    <div class="check-circle">✓</div>
                    <h2 class="gold-text" data-i18n="auth_success">Authenticated!</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- SCREEN 3: MAIN APP -->
    <div id="screen-3" class="screen">
        <div class="container" style="padding-top: 10px;">
            
            <div class="app-header">
                <div class="header-left">
                    <div class="header-logo">
                        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <h2 class="gold-text" style="font-size: 1.2rem;" data-i18n="app_name">LoanSmart AI</h2>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div class="user-phone">••• <span id="header-phone"></span></div>
                    <button class="theme-toggle" id="theme-btn">☀️</button>
                </div>
            </div>

            <div class="lang-switcher" id="lang-switcher">
                <!-- Pills generated by JS -->
            </div>

            <div class="glass-card" id="form-card">
                <form id="loan-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" data-i18n="gender">Gender</label>
                            <select id="f_gender" class="form-select" required>
                                <option value="male" data-i18n="male">Male</option>
                                <option value="female" data-i18n="female">Female</option>
                                <option value="other" data-i18n="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="marital">Marital Status</label>
                            <select id="f_marital" class="form-select" required>
                                <option value="yes" data-i18n="married">Married</option>
                                <option value="no" data-i18n="unmarried">Unmarried</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="education">Education</label>
                            <select id="f_education" class="form-select" required>
                                <option value="graduate" data-i18n="graduate">Graduate</option>
                                <option value="not_graduate" data-i18n="not_graduate">Not Graduate</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="dependents">Dependents</label>
                            <select id="f_dependents" class="form-select" required>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3+">3+</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="app_inc">Applicant Income (₹)</label>
                            <input type="number" id="f_app_inc" class="form-input" min="0" value="45000" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="co_inc">Co-applicant Income (₹)</label>
                            <input type="number" id="f_co_inc" class="form-input" min="0" value="0" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="loan_amt">Loan Amount (₹)</label>
                            <input type="number" id="f_loan_amt" class="form-input" min="10000" value="1500000" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="loan_term">Loan Term (Months)</label>
                            <input type="number" id="f_loan_term" class="form-input" min="12" value="360" required>
                        </div>
                        <div class="form-group full">
                            <label class="form-label" data-i18n="credit_hist">Credit History</label>
                            <select id="f_credit" class="form-select" required>
                                <option value="1" data-i18n="good_credit">Good (No defaults)</option>
                                <option value="0" data-i18n="bad_credit">Bad (Defaults present)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="prop_area">Property Area</label>
                            <select id="f_prop" class="form-select" required>
                                <option value="urban" data-i18n="urban">Urban</option>
                                <option value="semiurban" data-i18n="semiurban">Semiurban</option>
                                <option value="rural" data-i18n="rural">Rural</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="self_emp">Self Employed</label>
                            <select id="f_self" class="form-select" required>
                                <option value="no" data-i18n="no">No</option>
                                <option value="yes" data-i18n="yes">Yes</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-blue" data-i18n="predict_btn">Analyze Loan Approval</button>
                </form>
            </div>

            <div class="glass-card result-card" id="result-card">
                <div class="result-status" id="res-status">Approved</div>
                
                <div class="score-container">
                    <div class="score-header">
                        <span data-i18n="ai_score">AI Approval Score</span>
                        <span id="res-score-val" class="gold-text">0/100</span>
                    </div>
                    <div class="score-track">
                        <div class="score-threshold"></div>
                        <div class="score-fill" id="res-score-fill"></div>
                    </div>
                </div>

                <div class="factors-title" data-i18n="key_factors">Top Key Factors</div>
                <ul class="factors-list" id="res-factors">
                    <!-- JS populated -->
                </ul>

                <div class="simulator-section">
                    <div class="sim-header" data-i18n="sim_title">What-If Simulator</div>
                    
                    <div class="slider-group">
                        <div class="slider-info">
                            <span data-i18n="app_inc">Applicant Income</span>
                            <span class="slider-val">₹<span id="sim_inc_val">45,000</span></span>
                        </div>
                        <input type="range" id="sim_inc" min="10000" max="300000" step="5000" value="45000">
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-info">
                            <span data-i18n="loan_amt">Loan Amount</span>
                            <span class="slider-val">₹<span id="sim_loan_val">15,00,000</span></span>
                        </div>
                        <input type="range" id="sim_loan" min="100000" max="10000000" step="100000" value="1500000">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- MULTILINGUAL DICTIONARY (11 Languages) ---
        const langs = [
            { code: 'en', name: 'English' }, { code: 'hi', name: 'हिन्दी' }, { code: 'ta', name: 'தமிழ்' },
            { code: 'te', name: 'తెలుగు' }, { code: 'kn', name: 'ಕನ್ನಡ' }, { code: 'ml', name: 'മലയാളം' },
            { code: 'bn', name: 'বাংলা' }, { code: 'gu', name: 'ગુજરાતી' }, { code: 'mr', name: 'मराठी' },
            { code: 'pa', name: 'ਪੰਜਾਬੀ' }, { code: 'or', name: 'ଓଡ଼ିଆ' }
        ];

        const dict = {

                approved: "Approved", rejected: "Rejected", ai_score: "AI Approval Score", key_factors: "Top 4 Key Factors", sim_title: "What-If Simulator",
                f_cred_1: "Strong Credit History (+35)", f_cred_0: "Poor Credit History (+0)",
                f_inc_20: "Excellent Income Level (+20)", f_inc_10: "Good Income Level (+10)", f_inc_5: "Low Income Level (+5)",
                f_emi_20: "Healthy EMI Ratio (+20)", f_emi_15: "Moderate EMI Ratio (+15)", f_emi_10: "High EMI Ratio (+10)", f_emi_0: "Unsafe EMI Burden (+0)",
                f_edu_1: "Graduate Education (+10)", f_edu_0: "Not Graduated (+0)",
                f_prop_u: "Urban Property (+5)", f_prop_s: "Semiurban Property (+3)", f_prop_r: "Rural Property (+0)",

        function startTimer() {
            let timeLeft = 60;
            countdownEl.textContent = timeLeft;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;
                if(timeLeft <= 0) clearInterval(timerInterval);
            }, 1000);
        }

        verifyBtn.addEventListener('click', () => {
            const otp = Array.from(otpBoxes).map(b => b.value).join('');
            if(otp.length === 6) {
                document.getElementById('otp-input-section').style.display = 'none';
                document.getElementById('otp-success').style.display = 'flex';
                setTimeout(() => {
                    showScreen(2);
                    initMainApp();
                }, 1500);
            }
        });

        // --- SCREEN 3: MAIN APP ---
        function initMainApp() {
            // Setup Languages
            langs.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = `lang-pill ${lang.code === 'en' ? 'active' : ''}`;
                btn.textContent = lang.name;
                btn.onclick = () => setLanguage(lang.code, btn);
                langSwitcher.appendChild(btn);
            });
            setLanguage('en');
        }

        function setLanguage(code, btnEl = null) {
            currentLang = code;
            if(btnEl) {
                document.querySelectorAll('.lang-pill').forEach(b => b.classList.remove('active'));
                btnEl.classList.add('active');
            }
            const d = dict[code] || dict['en'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(d[key]) {
                    if (el.tagName === 'OPTION') {
                        // Some options might have mixed text, just replace innerText
                        el.innerText = d[key];
                    } else {
                        el.innerText = d[key];
                    }
                }
            });
            // Update results if visible
            if(document.getElementById('result-card').style.display === 'block') {
                calculateScore();
            }
        }

        themeBtn.addEventListener('click', () => {
            const root = document.documentElement;
            if(root.getAttribute('data-theme') === 'dark') {
                root.setAttribute('data-theme', 'light');
                themeBtn.textContent = '🌙';
            } else {
                root.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            }
        });

        // --- SCORING ALGORITHM ---
        function calculateScore() {
            const data = {
                appInc: parseFloat(document.getElementById('f_app_inc').value) || 0,
                coInc: parseFloat(document.getElementById('f_co_inc').value) || 0,
                loanAmt: parseFloat(document.getElementById('f_loan_amt').value) || 0,
                loanTerm: parseFloat(document.getElementById('f_loan_term').value) || 1,
                credit: document.getElementById('f_credit').value,
                edu: document.getElementById('f_education').value,
                prop: document.getElementById('f_prop').value,
                mar: document.getElementById('f_marital').value,
                self: document.getElementById('f_self').value
            };

            let score = 0;
            let factors = []; // { key, pts }

            // 1. Credit History (35)
            if(data.credit === '1') { score += 35; factors.push({key: 'f_cred_1', pts: 35}); }
            else { factors.push({key: 'f_cred_0', pts: -35}); } // negative for sorting importance

            // 2. Income (20)
            const totInc = data.appInc + data.coInc;
            if(totInc > 100000) { score += 20; factors.push({key: 'f_inc_20', pts: 20}); }
            else if(totInc > 50000) { score += 10; factors.push({key: 'f_inc_10', pts: 10}); }
            else { score += 5; factors.push({key: 'f_inc_5', pts: 5}); }

            // 3. EMI Ratio (20)
            const r = 0.09 / 12;
            const n = data.loanTerm;
            const p = data.loanAmt;
            const emi = (p * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            const emiRatio = (emi / totInc) * 100;
            
            if(emiRatio < 30) { score += 20; factors.push({key: 'f_emi_20', pts: 20}); }
            else if(emiRatio < 40) { score += 15; factors.push({key: 'f_emi_15', pts: 15}); }
            else if(emiRatio < 50) { score += 10; factors.push({key: 'f_emi_10', pts: 10}); }
            else { factors.push({key: 'f_emi_0', pts: -20}); }

            // 4. Education (10)
            if(data.edu === 'graduate') { score += 10; factors.push({key: 'f_edu_1', pts: 10}); }
            else { factors.push({key: 'f_edu_0', pts: 0}); }

            // 5. Property (5)
            if(data.prop === 'urban') { score += 5; factors.push({key: 'f_prop_u', pts: 5}); }
            else if(data.prop === 'semiurban') { score += 3; factors.push({key: 'f_prop_s', pts: 3}); }
            else { factors.push({key: 'f_prop_r', pts: 0}); }

            // 6. Marital (5)
            if(data.mar === 'yes') { score += 5; factors.push({key: 'f_mar_1', pts: 5}); }
            else { factors.push({key: 'f_mar_0', pts: 0}); }

            // 7. Self Employed (-5)
            if(data.self === 'yes') { score -= 5; factors.push({key: 'f_emp_1', pts: -5}); }
            else { factors.push({key: 'f_emp_0', pts: 0}); }

            // Render
            renderResult(score, factors);
        }

        function renderResult(score, factors) {
            const resCard = document.getElementById('result-card');
            const resStatus = document.getElementById('res-status');
            const scoreVal = document.getElementById('res-score-val');
            const scoreFill = document.getElementById('res-score-fill');
            const factorsList = document.getElementById('res-factors');
            const d = dict[currentLang];

            resCard.style.display = 'block';
            
            // Limit score 0-100
            score = Math.max(0, Math.min(100, score));

            if(score >= 55) {
                resStatus.textContent = d.approved;
                resStatus.className = 'result-status status-approved';
                scoreFill.style.background = 'var(--gold-grad)';
                scoreFill.style.boxShadow = '0 0 15px rgba(245, 197, 24, 0.5)';
            } else {
                resStatus.textContent = d.rejected;
                resStatus.className = 'result-status status-rejected';
                scoreFill.style.background = 'var(--red)';
                scoreFill.style.boxShadow = '0 0 15px rgba(255, 68, 68, 0.5)';
            }

            scoreVal.textContent = score + '/100';
            setTimeout(() => scoreFill.style.width = score + '%', 100);

            // Sort factors by absolute impact and take top 4
            factors.sort((a, b) => Math.abs(b.pts) - Math.abs(a.pts));
            const top4 = factors.slice(0, 4);
            
            factorsList.innerHTML = '';
            top4.forEach(f => {
                const li = document.createElement('li');
                const icon = document.createElement('span');
                icon.className = 'icon';
                icon.innerHTML = '✦';
                const text = document.createElement('span');
                text.textContent = d[f.key];
                li.appendChild(icon);
                li.appendChild(text);
                factorsList.appendChild(li);
            });
        }

        loanForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Sync simulators
            simInc.value = fAppInc.value;
            simLoan.value = fLoanAmt.value;
            document.getElementById('sim_inc_val').textContent = Number(simInc.value).toLocaleString('en-IN');
            document.getElementById('sim_loan_val').textContent = Number(simLoan.value).toLocaleString('en-IN');
            
            calculateScore();
            setTimeout(() => document.getElementById('result-card').scrollIntoView({behavior: 'smooth', block: 'start'}), 100);
        });

        // --- SIMULATOR SYNC ---
        simInc.addEventListener('input', (e) => {
            fAppInc.value = e.target.value;
            document.getElementById('sim_inc_val').textContent = Number(e.target.value).toLocaleString('en-IN');
            calculateScore();
        });

        simLoan.addEventListener('input', (e) => {
            fLoanAmt.value = e.target.value;
            document.getElementById('sim_loan_val').textContent = Number(e.target.value).toLocaleString('en-IN');
            calculateScore();
        });

        fAppInc.addEventListener('input', (e) => {
            simInc.value = e.target.value;
            document.getElementById('sim_inc_val').textContent = Number(e.target.value).toLocaleString('en-IN');
        });

        fLoanAmt.addEventListener('input', (e) => {
            simLoan.value = e.target.value;
            document.getElementById('sim_loan_val').textContent = Number(e.target.value).toLocaleString('en-IN');
        });

    </script>
</body>
</html>
